<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SignalRx — Consultant Dashboard | SignalRev Systems</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
  <style>
    :root{--green:#1D9E75;--green-dark:#0F6E56;--green-light:#E1F5EE;--green-deep:#085041;--text-primary:#111827;--text-secondary:#4B5563;--text-tertiary:#9CA3AF;--bg-primary:#FFFFFF;--bg-secondary:#F9FAFB;--bg-tertiary:#F3F4F6;--border:#E5E7EB;--border-light:#F3F4F6;--radius-md:8px;--radius-lg:12px;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;color:var(--text-primary);background:var(--bg-secondary);min-height:100vh;}
    .db{max-width:960px;margin:0 auto;background:var(--bg-primary);min-height:100vh;}
    .hdr{padding:1.25rem 1.5rem 0;border-bottom:1px solid var(--border-light);}
    .hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
    .logo{display:flex;align-items:baseline;gap:3px;}
    .logo-s{font-size:18px;font-weight:500;letter-spacing:-0.3px;}
    .logo-r{font-size:18px;font-weight:500;color:var(--green);font-style:italic;}
    .logo-tag{font-size:11px;color:var(--text-tertiary);letter-spacing:0.08em;text-transform:uppercase;margin-left:8px;}
    .badge{font-size:11px;font-weight:500;background:var(--green-light);color:var(--green-deep);padding:3px 10px;border-radius:var(--radius-md);}
    .view-toggle{display:flex;border:1px solid var(--border);border-radius:var(--radius-md);overflow:hidden;}
    .vt-btn{padding:6px 14px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:var(--bg-primary);color:var(--text-secondary);transition:all 0.15s;font-family:'DM Sans',sans-serif;}
    .vt-btn.active{background:var(--green);color:#fff;}
    .hdr-right{display:flex;align-items:center;gap:8px;}
    .search-row{display:flex;align-items:center;gap:10px;padding:0 0 1rem;}
    .search-icon-box{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border:1px solid var(--border);border-radius:var(--radius-md);background:var(--bg-secondary);flex-shrink:0;color:var(--text-tertiary);font-size:16px;}
    .search-input{flex:1;padding:8px 14px;border:1px solid var(--border);border-radius:var(--radius-md);font-family:'DM Sans',sans-serif;font-size:13px;background:var(--bg-primary);color:var(--text-primary);outline:none;transition:border-color 0.2s;height:36px;}
    .search-input:focus{border-color:var(--green);}
    .stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:1.25rem 1.5rem;border-bottom:1px solid var(--border-light);}
    .stat-card{background:var(--bg-secondary);border-radius:var(--radius-md);padding:12px 14px;}
    .stat-lbl{font-size:11px;color:var(--text-tertiary);font-weight:500;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;}
    .stat-val{font-size:24px;font-weight:500;line-height:1;}
    .stat-sub{font-size:11px;color:var(--text-tertiary);margin-top:4px;}
    .panel{display:none;}
    .panel.active{display:block;}
    .pipeline-wrap{padding:1.25rem 1.5rem;}
    .pipe-filters{display:flex;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap;}
    .filter-btn{padding:5px 14px;font-size:12px;font-weight:500;border:1px solid var(--border);border-radius:var(--radius-md);background:var(--bg-primary);color:var(--text-secondary);cursor:pointer;transition:all 0.15s;font-family:'DM Sans',sans-serif;white-space:nowrap;display:inline-flex;align-items:center;gap:5px;}
    .filter-btn.active{background:var(--green);color:#fff;border-color:var(--green);}
    .loading-state{text-align:center;padding:3rem;color:var(--text-tertiary);font-size:14px;}
    .spinner{width:32px;height:32px;border:3px solid var(--green-light);border-top-color:var(--green);border-radius:50%;margin:0 auto 1rem;animation:spin 0.8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .client-card{background:var(--bg-primary);border:1px solid var(--border-light);border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:10px;cursor:pointer;transition:border-color 0.15s;}
    .client-card:hover{border-color:var(--green);}
    .client-card.selected{border:2px solid var(--green);}
    .cc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;}
    .cc-left{display:flex;align-items:center;gap:10px;}
    .avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;flex-shrink:0;}
    .cc-name{font-size:14px;font-weight:500;margin-bottom:2px;}
    .cc-org{font-size:12px;color:var(--text-secondary);}
    .cc-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
    .score-big{font-size:20px;font-weight:500;}
    .score-of{font-size:12px;color:var(--text-tertiary);}
    .tier-pill{font-size:11px;font-weight:500;padding:2px 8px;border-radius:var(--radius-md);}
    .cc-mid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px;}
    .mini-score{background:var(--bg-secondary);border-radius:6px;padding:6px 8px;}
    .mini-lbl{font-size:10px;color:var(--text-tertiary);margin-bottom:3px;line-height:1.2;}
    .mini-val{font-size:13px;font-weight:500;}
    .mini-bar{height:2px;background:var(--bg-tertiary);border-radius:1px;margin-top:3px;overflow:hidden;}
    .mini-fill{height:100%;border-radius:1px;}
    .cc-bottom{display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid var(--border-light);}
    .cc-meta{display:flex;align-items:center;gap:12px;}
    .meta-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text-tertiary);}
    .status-pill{font-size:11px;font-weight:500;padding:3px 10px;border-radius:var(--radius-md);}
    .flag-btn{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:500;padding:3px 10px;border-radius:var(--radius-md);cursor:pointer;border:1px solid var(--border);background:var(--bg-primary);color:var(--text-secondary);font-family:'DM Sans',sans-serif;transition:all 0.15s;}
    .flag-btn.flagged{background:#FAEEDA;border-color:#EF9F27;color:#633806;}
    .detail-wrap{padding:1.25rem 1.5rem;}
    .detail-back{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-secondary);cursor:pointer;margin-bottom:1.25rem;border:none;background:none;font-family:'DM Sans',sans-serif;padding:0;}
    .detail-back:hover{color:var(--text-primary);}
    .detail-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.25rem;padding-bottom:1.25rem;border-bottom:1px solid var(--border-light);}
    .detail-org{font-size:18px;font-weight:500;margin-bottom:4px;}
    .detail-meta-txt{font-size:13px;color:var(--text-secondary);}
    .detail-score-num{font-size:32px;font-weight:500;line-height:1;}
    .detail-score-tier{font-size:12px;font-weight:500;padding:3px 10px;border-radius:var(--radius-md);display:inline-block;margin-top:4px;}
    .section-title{font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-tertiary);margin-bottom:10px;}
    .contact-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:1.5rem;}
    .contact-card{background:var(--bg-secondary);border-radius:var(--radius-md);padding:10px 12px;display:flex;align-items:center;gap:10px;}
    .contact-icon{font-size:16px;color:var(--text-tertiary);flex-shrink:0;}
    .contact-lbl{font-size:11px;color:var(--text-tertiary);margin-bottom:2px;}
    .contact-val{font-size:13px;font-weight:500;}
    .contact-val a{color:var(--green);text-decoration:none;}
    .scores-8{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.5rem;}
    .score8-card{background:var(--bg-secondary);border-radius:var(--radius-md);padding:10px 12px;}
    .score8-cat{font-size:11px;color:var(--text-tertiary);margin-bottom:4px;font-weight:500;}
    .score8-val{font-size:18px;font-weight:500;}
    .score8-denom{font-size:11px;color:var(--text-tertiary);}
    .score8-bar{height:3px;background:var(--bg-tertiary);border-radius:2px;margin-top:5px;overflow:hidden;}
    .score8-fill{height:100%;border-radius:2px;}
    .or-item{background:var(--bg-secondary);border-radius:var(--radius-md);padding:10px 12px;margin-bottom:8px;}
    .or-cat{font-size:11px;font-weight:500;color:var(--text-tertiary);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.06em;}
    .or-text{font-size:13px;line-height:1.6;font-style:italic;}
    .rx-report-box{background:var(--bg-secondary);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1.5rem;font-size:14px;line-height:1.8;}
    .rx-report-box h3{font-family:'DM Serif Display',serif;font-size:17px;font-weight:400;margin:1.5rem 0 0.5rem;}
